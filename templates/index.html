<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAG Local</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --surface2:   #22263a;
      --border:     #2e3350;
      --accent:     #6c63ff;
      --accent2:    #a78bfa;
      --user-bg:    #6c63ff22;
      --ai-bg:      #1a1d27;
      --text:       #e2e8f0;
      --text-muted: #64748b;
      --green:      #34d399;
      --radius:     14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .model-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    select#model-select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    select#model-select:focus { border-color: var(--accent); }

    .status-dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Chat Area ───────────────────────────────── */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #chat-area::-webkit-scrollbar { width: 4px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
    }
    .empty-state .big-icon { font-size: 48px; }
    .empty-state h2 { font-size: 18px; font-weight: 500; color: var(--text); }
    .empty-state p  { font-size: 14px; line-height: 1.6; max-width: 340px; }

    /* Messages */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user  { align-self: flex-end; align-items: flex-end; }
    .message.ai    { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.7;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.ai .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .sender-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Source badges */
    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .source-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .source-badge .score {
      color: var(--green);
      font-weight: 600;
    }

    /* Thinking indicator */
    .thinking .bubble {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-style: italic;
    }
    .dots { display: flex; gap: 4px; }
    .dots span {
      width: 6px; height: 6px;
      background: var(--accent2);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(1); opacity: 0.5; }
      40%            { transform: scale(1.3); opacity: 1; }
    }

    /* ── Input Bar ───────────────────────────────── */
    .input-area {
      padding: 16px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 900px;
      margin: 0 auto;
    }

    textarea#question-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 46px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    textarea#question-input::placeholder { color: var(--text-muted); }
    textarea#question-input:focus { border-color: var(--accent); }

    button#send-btn {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 18px;
      width: 46px;
      height: 46px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }
    button#send-btn:hover   { opacity: 0.9; }
    button#send-btn:active  { transform: scale(0.95); }
    button#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">🧠</div>
      RAG Local
    </div>
    <div class="header-right">
      <span class="model-label">Model</span>
      <select id="model-select">
        {% for model in models %}
          <option value="{{ model }}">{{ model }}</option>
        {% endfor %}
      </select>
      <div class="status-dot" title="Ollama running"></div>
    </div>
  </header>

  <!-- CHAT AREA -->
  <div id="chat-area">
    <div class="empty-state" id="empty-state">
      <div class="big-icon">💬</div>
      <h2>Ask anything from your documents</h2>
      <p>Your knowledge base has been loaded. Type a question below and the AI will answer using only your documents.</p>
    </div>
  </div>

  <!-- INPUT BAR -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="question-input"
        placeholder="Ask a question about your documents..."
        rows="1"
      ></textarea>
      <button id="send-btn" title="Send (Enter)">➤</button>
    </div>
    <p class="input-hint">Press <strong>Enter</strong> to send · <strong>Shift+Enter</strong> for a new line</p>
  </div>

  <script>
    const chatArea     = document.getElementById('chat-area');
    const emptyState   = document.getElementById('empty-state');
    const input        = document.getElementById('question-input');
    const sendBtn      = document.getElementById('send-btn');
    const modelSelect  = document.getElementById('model-select');

    // Auto-resize textarea as user types
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    // Send on Enter (Shift+Enter = new line)
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    sendBtn.addEventListener('click', sendMessage);

    function addMessage(role, content, sources = []) {
      // Hide empty state on first message
      emptyState.style.display = 'none';

      const msg = document.createElement('div');
      msg.className = `message ${role}`;

      const label = document.createElement('div');
      label.className = 'sender-label';
      label.textContent = role === 'user' ? 'You' : '🤖 AI';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = content;

      msg.appendChild(label);
      msg.appendChild(bubble);

      // Source badges (AI messages only)
      if (role === 'ai' && sources.length > 0) {
        const sourcesDiv = document.createElement('div');
        sourcesDiv.className = 'sources';
        sources.forEach(s => {
          const badge = document.createElement('div');
          badge.className = 'source-badge';
          badge.innerHTML = `📄 ${s.file} · chunk #${s.chunk} · <span class="score">${s.score}%</span>`;
          sourcesDiv.appendChild(badge);
        });
        msg.appendChild(sourcesDiv);
      }

      chatArea.appendChild(msg);
      chatArea.scrollTop = chatArea.scrollHeight;
      return msg;
    }

    function addThinking() {
      emptyState.style.display = 'none';
      const msg = document.createElement('div');
      msg.className = 'message ai thinking';
      msg.innerHTML = `
        <div class="sender-label">🤖 AI</div>
        <div class="bubble">
          Thinking
          <div class="dots">
            <span></span><span></span><span></span>
          </div>
        </div>`;
      chatArea.appendChild(msg);
      chatArea.scrollTop = chatArea.scrollHeight;
      return msg;
    }

    async function sendMessage() {
      const question = input.value.trim();
      if (!question) return;

      const model = modelSelect.value;

      // Add user message
      addMessage('user', question);

      // Clear input
      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;

      // Show thinking indicator
      const thinkingEl = addThinking();

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, model }),
        });

        const data = await res.json();

        // Remove thinking indicator
        thinkingEl.remove();

        if (data.error) {
          addMessage('ai', `⚠️ Error: ${data.error}`);
        } else {
          addMessage('ai', data.answer, data.sources);
        }
      } catch (err) {
        thinkingEl.remove();
        addMessage('ai', '⚠️ Could not reach the server. Is app.py running?');
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }
  </script>

</body>
</html>
